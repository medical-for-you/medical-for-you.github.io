<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب عضوية | ميديكال فور يو</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* التنسيقات العامة مع الخط الجديد */
        body {
            font-family: 'Cairo', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            position: relative;
            overflow-x: hidden; /* لمنع ظهور شريط التمرير الأفقي بسبب الأشكال المتحركة */
        }

        /* كود الأشكال المتحركة والمتموجة في الخلفية */
        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #f4f7f6, #e0f2f1);
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(10, 147, 150, 0.15);
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape1 { width: 150px; height: 150px; top: 10%; left: 15%; animation-duration: 8s; }
        .shape2 { width: 300px; height: 300px; top: 40%; left: 75%; animation-duration: 12s; }
        .shape3 { width: 200px; height: 200px; top: 75%; left: 20%; animation-duration: 10s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            100% { transform: translateY(-40px) scale(1.1) rotate(20deg); }
        }

        /* تثبيت شريط التنقل العلوي المتناسق مع الرئيسية */
        header { 
            background-color: #005f73; 
            color: white; 
            padding: 15px 20px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 28px; }
        header p { margin: 5px 0 15px 0; font-size: 14px; color: #e0f2f1; }
        
        nav { display: flex; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-size: 16px; font-weight: 700; transition: color 0.3s; }
        nav a:hover { color: #ffb703; }

        /* محتوى الاستمارة وتنسيق الصندوق */
        main { 
            padding: 30px; 
            max-width: 700px; 
            margin: 40px auto; 
            background-color: rgba(255, 255, 255, 0.95); 
            border-radius: 10px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            position: relative; 
            z-index: 1; 
        }
        
        h2 { text-align: center; color: #005f73; font-weight: 700; font-size: 2em; margin-bottom: 5px; }
        .subtitle { text-align: center; margin-bottom: 30px; color: #555; font-size: 1.1em; }

        fieldset { 
            border: 2px solid #e9ecef; 
            padding: 20px; 
            margin-bottom: 25px; 
            border-radius: 8px; 
            background-color: #fff;
        }
        legend { 
            font-weight: 700; 
            color: #0a9396; 
            font-size: 1.2em; 
            padding: 0 10px; 
        }

        label { font-weight: 600; color: #333; }
        input[type="text"], input[type="tel"], input[type="email"], select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            margin-bottom: 20px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-family: 'Cairo', sans-serif; 
            font-size: 1em;
        }

        /* تنسيق الزر بحركة ناعمة */
        .submit-btn { 
            background-color: #0a9396; 
            color: white; 
            padding: 15px 30px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: 700; 
            transition: all 0.3s ease; 
            font-family: 'Cairo', sans-serif;
            width: 100%;
        }
        .submit-btn:hover { 
            background-color: #005f73; 
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,95,115,0.3);
        }
    </style>
</head>
<body>

    <div class="background-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <header>
        <h1><i class="fa-solid fa-heart-pulse" style="color: #ffb703; margin-left: 10px;"></i>منظمة ميديكال فور يو</h1>
        <p>انضم إلى فريقنا الطبي</p>
        <nav>
            <a href="index.html"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
        </nav>
    </header>

    <main>
        <h2><i class="fa-solid fa-user-plus" style="margin-left: 10px;"></i>استمارة العضوية</h2>
        <p class="subtitle">يرجى تعبئة البيانات التالية بدقة للإنضمام إلى شبكة ميديكال فور يو.</p>

        <form id="membershipForm" action="#" method="POST">
            
            <fieldset>
                <legend><i class="fa-solid fa-id-card" style="margin-left: 8px;"></i>البيانات الشخصية</legend>
                
                <label for="fullName">الاسم الرباعي:</label>
                <input type="text" id="fullName" name="fullName" placeholder="اكتب اسمك الرباعي..." required>

                <label for="phone">رقم الهاتف:</label>
                <input type="tel" id="phone" name="phone" placeholder="مثال: 0912345678" required>

                <label for="email">البريد الإلكتروني:</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </fieldset>

            <fieldset>
                <legend><i class="fa-solid fa-user-doctor" style="margin-left: 8px;"></i>البيانات المهنية</legend>

                <label for="specialty">التخصص الطبي:</label>
                <select id="specialty" name="specialty" required>
                    <option value="">-- اختر التخصص --</option>
                    <option value="nursing">تمريض</option>
                    <option value="medicine">طب بشري</option>
                    <option value="public_health">صحة عامة / مكافحة عدوى</option>
                    <option value="other">أخرى</option>
                </select>

                <label for="cv"><i class="fa-solid fa-file-pdf" style="color: #d32f2f; margin-left: 5px;"></i> إرفاق السيرة الذاتية (PDF):</label>
                <input type="file" id="cv" name="cv" accept=".pdf" style="margin-top: 10px; margin-bottom: 20px; display: block;">
            </fieldset>

            <div style="text-align: center;">
                <button type="submit" class="submit-btn"><i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i>تقديم طلب العضوية</button>
            </div>
        </form>
    </main>

    <footer style="background-color: #222; color: white; text-align: center; padding: 20px 0; font-family: 'Cairo', sans-serif;">
        <p style="margin: 0;">&copy; 2026 جميع الحقوق محفوظة لمنظمة ميديكال فور يو.</p>
    </footer>

    <script>
        document.getElementById("membershipForm").addEventListener("submit", function(event) {
            event.preventDefault();

            let phoneValue = document.getElementById("phone").value;
            let specialtyValue = document.getElementById("specialty").value;

            let phoneRegex = /^[0-9]{10,}$/;
            if (!phoneRegex.test(phoneValue)) {
                alert("عذراً، يرجى إدخال رقم هاتف صحيح (يجب أن يكون 10 أرقام على الأقل ولا يحتوي على حروف).");
                return; 
            }

            if (specialtyValue === "") {
                alert("يرجى اختيار التخصص الطبي من القائمة المنسدلة.");
                return; 
            }

            alert("تم إرسال طلب العضوية بنجاح! شكراً لانضمامك لمنظمة ميديكال فور يو.");
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
